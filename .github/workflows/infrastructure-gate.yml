name: Infrastructure Gate

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 */6 * * *' # Every 6 hours
  workflow_dispatch:

jobs:
  check-infrastructure:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Run infrastructure check
        run: ./scripts/check-infrastructure-ready.sh

      - name: Fetch Ecosystem Updates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/fetch_updates.py

      - name: Commit updates
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add site/updates.json site/index.html
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: auto-update ecosystem data [skip ci]"
          git push || echo "No changes to push"

      - name: Report Status
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "Infrastructure is ready for deployment."
          else
            echo "Infrastructure check failed. Deployment blocked."
            exit 1
          fi
